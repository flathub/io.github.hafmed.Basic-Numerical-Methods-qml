    # Example Flatpak manifest for a simple Qt application
    app-id: io.github.hafmed.Basic-Numerical-Methods-qml
    runtime: org.kde.Platform
    runtime-version: "6.10"
    sdk: org.kde.Sdk
    command: appbasic_numerical_methods_qml
    finish-args:
        - --share=ipc
        - --socket=fallback-x11
        - --socket=wayland
        - --device=dri
        - --device=all
    modules:
      - name: appbasic_numerical_methods_qml
        buildsystem: cmake-ninja
        sources:
          - type: archive
            url: https://github.com/hafmed/Basic-Numerical-Methods-qml/archive/refs/tags/v1.7.9-release1.tar.gz
            sha256: 99373ffb23c76b35ecef848a5dcfd7e8e75f21421591f5594a11e11545d88da9
 
