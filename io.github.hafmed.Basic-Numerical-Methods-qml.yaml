    # Example Flatpak manifest for a simple Qt application
    app-id: io.github.hafmed.Basic-Numerical-Methods-qml
    runtime: org.kde.Platform
    runtime-version: "6.10"
    sdk: org.kde.Sdk
    command: appbasic_numerical_methods_qml
    finish-args:
        - --share=ipc
        - --socket=fallback-x11
        - --socket=wayland
        - --device=dri
    modules:
      - name: appbasic_numerical_methods_qml
        buildsystem: cmake-ninja
        sources:
          - type: archive
            url: https://github.com/hafmed/Basic-Numerical-Methods-qml/archive/refs/tags/v1.7.7-release3.tar.gz
            sha256: 41f46f1cc039a59908dfd0c07bf89226ec5890b58d3f8396e514856d15266f53
 
