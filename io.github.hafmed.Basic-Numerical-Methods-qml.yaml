      - name: appbasic_numerical_methods_qml
        buildsystem: cmake-ninja
        sources:
          - type: archive
            url: https://github.com/hafmed/Basic-Numerical-Methods-qml/archive/refs/tags/v1.7.5-release2.tar.gz
            sha256: 69a2e1e44a0ec1ef27d05f5802b0e7b48f923bf37b4d737c7c19dfe0cbf13ef8
 
